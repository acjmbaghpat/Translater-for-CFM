<!DOCTYPE html>
<html>
<head>
  <title>Excel Hindi Translator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .container { background: white; padding: 24px; border-radius: 8px; max-width: 600px; box-shadow: 0 2px 8px #0001; }
    h2 { color: #1a237e; margin-top: 0; }
    button { background: #1a237e; color: white; border: none; padding: 10px 22px; border-radius: 5px; cursor: pointer; margin-right: 10px; font-size: 14px; }
    button:hover { background: #283593; }
    input[type=file] { margin-bottom: 10px; }
    #status { color: #555; margin-top: 12px; font-size: 14px; min-height: 20px; }
    .legend { font-size: 12px; color: #888; margin-top: 20px; border-top: 1px solid #eee; padding-top: 12px; }
    .legend b { color: #333; }
  </style>
</head>
<body>
<div class="container">
  <h2>📋 Excel Translator – Baghpat Court</h2>

  <input type="file" id="fileInput" accept=".xlsx,.xls"/>
  <br>
  <button onclick="processFile()">Upload & Process</button>
  <button onclick="downloadFile()">⬇ Download Excel</button>

  <p id="status"></p>

  <div class="legend">
    <b>Col 1:</b> Same &nbsp;|&nbsp;
    <b>Col 2:</b> Case type → short form (e.g. Bail Application/23/2026 → BA/23/2026) &nbsp;|&nbsp;
    <b>Col 3:</b> Hindi translate + short (राज्य सरकार बनाम X → स-X, बनाम → -)
  </div>
</div>

<script>
// ─── Case Type Short Form Map ───────────────────────────────────────────────
const CASE_MAP = {
  "anticipatory bail application under section 438 crpc": "ABA",
  "anticipatory bail application":           "ABA",
  "arbitration":                             "ARB",
  "assesement appeal":                       "AA",
  "assessment appeal":                       "AA",
  "bail application":                        "BA",
  "ceiling appeal":                          "CeilA",
  "civil appeal":                            "CivA",
  "civil reivision":                         "CR",
  "civil revision":                          "CR",
  "claim petition":                          "CP",
  "complaint cases":                         "CC",
  "contempt":                                "CONT",
  "cri. case":                               "CRI",
  "criminal appeal":                         "CrA",
  "criminal bail cancellation":              "CBC",
  "criminal misc.":                          "CM",
  "criminal misc":                           "CM",
  "criminal misc. cases":                    "CMC",
  "criminal misc cases":                     "CMC",
  "criminal revision":                       "CRR",
  "d.p. misc.":                              "DPM",
  "d.p. misc":                               "DPM",
  "election petition":                       "EP",
  "election revision":                       "ER",
  "essential commodities act":               "ECA",
  "execuition cases":                        "EC",
  "execution cases":                         "EC",
  "execution":                               "EXE",
  "final report":                            "FR",
  "first appeal":                            "FA",
  "first appeal from order":                 "FAFO",
  "gaurdian wards act":                      "GWA",
  "guardian wards act":                      "GWA",
  "hindu marriage act":                      "HMA",
  "judge small cause court case":            "JSCCC",
  "juvenile cases":                          "JC",
  "land acquisition act":                    "LAA",
  "maintenance":                             "MAINT",
  "matrimonial":                             "MAT",
  "misc. cases":                             "MC",
  "misc cases":                              "MC",
  "misc.civil":                              "MCC",
  "misc. civil":                             "MCC",
  "misc. civil appeal":                      "MCA",
  "misc civil appeal":                       "MCA",
  "misc. nagar nigam":                       "MNN",
  "misc. pa":                                "MPA",
  "motar accident claim pitition":           "MACP",
  "motor accident claim petition":           "MACP",
  "mutation appeal":                         "MutA",
  "n.d.p.s.":                               "NDPS",
  "ndps":                                    "NDPS",
  "original suit":                           "OS",
  "p.a.suit":                               "PAS",
  "p.a. suit":                              "PAS",
  "probate":                                 "PROB",
  "rent control appeal":                     "RCA",
  "rent control revision":                   "RCR",
  "restoration":                             "REST",
  "restoration misc":                        "RM",
  "review":                                  "REV",
  "s.c.c. revision":                        "SCCR",
  "s.c.c. suit":                            "SCCS",
  "sec.174a ipc vis-a-vis sec.195":         "S174",
  "second appeal":                           "SA",
  "session trial":                           "ST",
  "small cause court":                       "SCC",
  "special case (anti curroption)":          "SCAC",
  "special case (anti corruption)":          "SCAC",
  "special trial":                           "SST",
  "s.t.- posco act":                        "POSCO",
  "st- posco act":                           "POSCO",
  "succession":                              "SUCC",
  "summan case":                             "SC",
  "summons case":                            "SC",
  "summery trial":                           "SumT",
  "summary trial":                           "SumT",
  "warrant case":                            "WC",
  "warrant or summons criminal case":        "WSC",
};

// ─── Column 2: Shorten case type keeping /number/year intact ─────────────────
function shortenCaseNo(cellVal) {
  if (!cellVal) return cellVal;
  const str = String(cellVal);
  const slashIdx = str.indexOf("/");
  if (slashIdx === -1) {
    // No slash — just try to replace whole value as case type
    const key = str.trim().toLowerCase().replace(/\s+/g, ' ');
    return CASE_MAP[key] || str;
  }
  const typePart  = str.substring(0, slashIdx).trim();
  const restPart  = str.substring(slashIdx);          // keeps "/23/2026"
  const key       = typePart.toLowerCase().replace(/\s+/g, ' ');
  const shortForm = CASE_MAP[key] || typePart;         // fallback = original
  return shortForm + restPart;
}

// ─── Column 3: Post-process translated Hindi ─────────────────────────────────
// "राज्य सरकार बनाम X" → "स-X"
// "A बनाम B"           → "A-B"
function shortenHindi(text) {
  if (!text) return text;
  text = text.replace(/राज्य\s*सरकार\s*बनाम\s*/g, 'स-');
  text = text.replace(/\s*बनाम\s*/g, '-');
  return text.trim();
}

// ─── Google Translate ─────────────────────────────────────────────────────────
async function translateToHindi(text) {
  const res  = await fetch(
    `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=hi&dt=t&q=${encodeURIComponent(text)}`
  );
  const data = await res.json();
  return data[0].map(d => d[0]).join('');
}

// ─── Main ─────────────────────────────────────────────────────────────────────
let workbook;
let translatedData = [];

async function processFile() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) { alert("Please upload an Excel file"); return; }

  setStatus("Reading file…");
  const reader = new FileReader();
  reader.onload = async function(e) {
    const data = new Uint8Array(e.target.result);
    workbook = XLSX.read(data, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    translatedData = [];

    for (let i = 0; i < jsonData.length; i++) {
      const row = [...jsonData[i]];   // shallow copy

      if (i === 0) {                  // header row — keep as-is
        translatedData.push(row);
        continue;
      }

      // Col 2 (index 1) — shorten case number
      if (row[1] !== undefined && row[1] !== null && row[1] !== '') {
        row[1] = shortenCaseNo(row[1]);
      }

      // Col 3 (index 2) — translate then shorten
      if (row[2] !== undefined && row[2] !== null && row[2] !== '') {
        setStatus(`Translating row ${i} of ${jsonData.length - 1}…`);
        const hindi = await translateToHindi(String(row[2]));
        row[2] = shortenHindi(hindi);
      }

      translatedData.push(row);
    }

    setStatus("✅ Processing complete! Click Download.");
  };
  reader.readAsArrayBuffer(file);
}

function downloadFile() {
  if (!translatedData.length) { alert("Process a file first."); return; }
  const ws = XLSX.utils.aoa_to_sheet(translatedData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Processed");
  XLSX.writeFile(wb, "Court_Processed.xlsx");
  setStatus("📥 File downloaded.");
}

function setStatus(msg) {
  document.getElementById('status').innerText = msg;
}
</script>
</body>
</html>
